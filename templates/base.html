<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Misubank{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #334155;
            --border: #475569;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --green: #34d399;
            --red: #f87171;
            --yellow: #fbbf24;
            --radius: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        nav .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.15s;
        }

        nav a:hover, nav a.active { color: var(--text); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
        }

        input, select, textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            padding: 0.4rem 0.6rem;
            font-size: 0.85rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button, .btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: background 0.15s;
        }

        button:hover, .btn:hover { background: var(--accent-hover); }

        .btn-sm {
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: transparent;
        }

        .btn-danger {
            background: var(--red);
        }

        .btn-danger:hover {
            background: #ef4444;
        }

        .btn-green {
            background: var(--green);
            color: var(--bg);
        }

        .btn-green:hover { background: #10b981; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--surface2);
            font-size: 0.85rem;
            vertical-align: top;
        }

        tr:hover { background: rgba(255,255,255,0.02); }

        .amount-negative { color: var(--red); }
        .amount-positive { color: var(--green); }

        .tag {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 500;
            margin-right: 0.25rem;
            border: 1px solid var(--border);
            cursor: default;
        }

        .tag .remove {
            cursor: pointer;
            margin-left: 0.2rem;
            opacity: 0.5;
        }

        .tag .remove:hover { opacity: 1; }

        .subscription-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            background: var(--yellow);
            color: var(--bg);
            font-weight: 600;
        }

        .cancelled-badge {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            background: var(--green);
            color: var(--bg);
            font-weight: 600;
        }

        .savings-card {
            background: linear-gradient(135deg, #065f46, #064e3b);
            border: 1px solid var(--green);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .savings-amount {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--green);
        }

        .savings-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .detail-row {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            margin-top: 0.4rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .pill-nav {
            display: flex;
            gap: 0.25rem;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 0.25rem;
            border: 1px solid var(--border);
        }

        .pill-nav a {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .pill-nav a.active {
            background: var(--accent);
            color: white;
        }

        .inline-form {
            display: inline-flex;
            gap: 0.25rem;
            align-items: center;
        }

        .category-badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 500;
            border: 1px solid;
        }

        .apply-rule-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .apply-rule-hint a {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        .editable-display {
            cursor: pointer;
        }

        .editable-display:hover {
            outline: 1px dashed var(--border);
            outline-offset: 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">Misubank</a>
        <a href="/" class="{{ 'active' if request.endpoint == 'index' }}">Transactions</a>
        <a href="/savings" class="{{ 'active' if request.endpoint == 'savings' }}">Savings</a>
        <a href="/report" class="{{ 'active' if request.endpoint == 'report' }}">Report</a>
        <a href="/categories" class="{{ 'active' if request.endpoint == 'categories_page' }}">Categories</a>
        <a href="/rules" class="{{ 'active' if request.endpoint == 'rules_page' }}">Rules</a>
        <a href="/tags" class="{{ 'active' if request.endpoint == 'tags_page' }}">Tags</a>
        <form action="/sync" method="post" style="margin-left: auto;">
            <button type="submit" class="btn-outline btn-sm">Sync Transactions</button>
        </form>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
